# GFS clone: 1 naming server + 4 storage servers + a client helper.
#
#   docker compose up --build -d        # start the cluster
#   docker compose run --rm client ...   # run client commands (see README)
#
# Replication factor is 3 (each chunk on 3 of the 4 storage servers), so the
# cluster can heal a single storage loss onto the remaining live spare.

services:
  naming:
    build: .
    image: gfs
    command: ["python", "-m", "gfs.naming_server"]
    environment:
      PORT: "50051"
      METADATA_DB: "/data/metadata.db"
      REPLICATION_FACTOR: "3"
      METRICS_PORT: "8000"
      CLEANUP_MAX_AGE: "0"  # 0 = disable stale-pending cleanup
      # gRPC worker threads: the naming server is the metadata bottleneck, so
      # give it plenty of headroom (override with GRPC_MAX_WORKERS).
      GRPC_MAX_WORKERS: "${NAMING_WORKERS:-64}"
    ports:
      - "50051:50051"   # exposed so a client on the host can connect too
    volumes:
      - naming-data:/data
    # Cap utilisation so a load spike can't saturate the host (which itself
    # causes RPC/heartbeat timeouts).  The naming server is the busiest node,
    # so it gets the largest share.  Tune via env, e.g. NAMING_CPUS=3.
    deploy:
      resources:
        limits:
          cpus: "${NAMING_CPUS:-2.0}"
          memory: "${NAMING_MEM:-1g}"
        reservations:
          cpus: "0.5"
          memory: 256m

  storage1:
    image: gfs
    build: .
    command: ["python", "-m", "gfs.storage_server"]
    environment:
      PORT: "50061"
      DATA_DIR: "/data/chunks"
      NAMING_SERVER: "naming:50051"
      ADVERTISE_ADDR: "storage1:50061"
      METRICS_PORT: "8000"
      GRPC_MAX_WORKERS: "${STORAGE_WORKERS:-32}"
    volumes:
      - storage1-data:/data
    depends_on:
      - naming
    deploy:
      resources:
        limits:
          cpus: "${STORAGE_CPUS:-1.0}"
          memory: "${STORAGE_MEM:-512m}"
        reservations:
          cpus: "0.25"
          memory: 128m

  storage2:
    image: gfs
    build: .
    command: ["python", "-m", "gfs.storage_server"]
    environment:
      PORT: "50061"
      DATA_DIR: "/data/chunks"
      NAMING_SERVER: "naming:50051"
      ADVERTISE_ADDR: "storage2:50061"
      METRICS_PORT: "8000"
      GRPC_MAX_WORKERS: "${STORAGE_WORKERS:-32}"
    volumes:
      - storage2-data:/data
    depends_on:
      - naming
    deploy:
      resources:
        limits:
          cpus: "${STORAGE_CPUS:-1.0}"
          memory: "${STORAGE_MEM:-512m}"
        reservations:
          cpus: "0.25"
          memory: 128m

  storage3:
    image: gfs
    build: .
    command: ["python", "-m", "gfs.storage_server"]
    environment:
      PORT: "50061"
      DATA_DIR: "/data/chunks"
      NAMING_SERVER: "naming:50051"
      ADVERTISE_ADDR: "storage3:50061"
      METRICS_PORT: "8000"
      GRPC_MAX_WORKERS: "${STORAGE_WORKERS:-32}"
    volumes:
      - storage3-data:/data
    depends_on:
      - naming
    deploy:
      resources:
        limits:
          cpus: "${STORAGE_CPUS:-1.0}"
          memory: "${STORAGE_MEM:-512m}"
        reservations:
          cpus: "0.25"
          memory: 128m

  storage4:
    image: gfs
    build: .
    command: ["python", "-m", "gfs.storage_server"]
    environment:
      PORT: "50061"
      DATA_DIR: "/data/chunks"
      NAMING_SERVER: "naming:50051"
      ADVERTISE_ADDR: "storage4:50061"
      METRICS_PORT: "8000"
      GRPC_MAX_WORKERS: "${STORAGE_WORKERS:-32}"
    volumes:
      - storage4-data:/data
    depends_on:
      - naming
    deploy:
      resources:
        limits:
          cpus: "${STORAGE_CPUS:-1.0}"
          memory: "${STORAGE_MEM:-512m}"
        reservations:
          cpus: "0.25"
          memory: 128m

  # Helper container for running client commands inside the compose network.
  # It stays up (sleep) so you can `docker compose exec` or `run` against it.
  client:
    image: gfs
    build: .
    command: ["sleep", "infinity"]
    environment:
      NAMING_SERVER: "naming:50051"
    volumes:
      - ./samples:/samples
      - ./scripts:/scripts:ro
    depends_on:
      - naming

  prometheus:
    image: prom/prometheus:v3.3.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - naming
      - storage1
      - storage2
      - storage3
      - storage4

  grafana:
    image: grafana/grafana:12.0.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  naming-data:
  storage1-data:
  storage2-data:
  storage3-data:
  storage4-data:
  prometheus-data:
  grafana-data:
